interface:
  display_name: "Claude Worker"
  short_description: "Dispatch tasks to Claude Code with alignment gate, visible mirrorPool runs, quality gates, and structured review."
  default_prompt: "Use normal Claude Code CLI as the implementation executor. Run align-intent first to confirm intent alignment before dispatching. For small tasks, use synchronous dispatch; for longer foreground work, use visible background dispatch with WorkspaceMode mirrorPool. Choose dispatch mode using the task decomposition decision tree (sync vs background vs parallel vs serial). Coordinate related runs through batch status files, use the Q&A protocol when ambiguity arises, review changes against the post-dispatch checklist, run quality gates, apply accepted changes with apply-dispatch.ps1, and only accept passing work."
